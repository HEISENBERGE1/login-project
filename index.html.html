<!DOCTYPE html>
<html>

<head>
    <title>Login Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100..900&display=swap" rel="stylesheet">

    <title>sign in to your account</title>

    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url(b3.jpg);
            background-size: cover;
            background-position: center;
        }

        .main-tab {
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex;
            flex-direction: column;
            width: 400px;
            justify-content: center;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.15);
            height: 400px;
            border-radius: 10px;
            transition: 0.5s;
        }

        .main-tab:hover {
            width: 450px;
            height: 450px;
           background: rgba(128,128,128,0.5);
        }

        .sign-in {
            font-family: Roboto, Arial;
            font-weight: 700;
            color: white;
            font-size: x-large;
        }

        .input-box {
            position: relative;
            width: 300px;
            margin-bottom: 20px;
            margin-right: 55px;
            transition: 0.2s;
        }
        .input-box:hover{
            width: 320px;
            
        }

        .input-box input {
            width: 100%;
            height: 45px;
            padding-left: 15px;
            padding-right: 40px;


            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.4);

            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(1px);

            color: black;
            outline: none;
        }



        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 300px;
            margin-bottom: 20px;
            color: white;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 6px;

        }

        .remember input {
            cursor: pointer;
        }

        .remember-forgot a {
            text-decoration: none;
            color: white;
        }

        .submit {
            width: 350px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            height: 45px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(1px);
            color: white;
            transition: 0.5s;

        }

        .submit:hover {
            background-color: white;
            border-color: white;
            color: black;
            cursor: pointer;
            width: 370px;
            height: 50px;

        }

        .register {
            color: black;
            width: 200px;
            transition: 0.5s;
        }
        
        .register:hover{
            color:white;
            cursor: pointer;
            text-decoration: underline;
            
        
        }
        .input-box input::placeholder {
            color: white;
        }

        .cheakbox {
            cursor: pointer;
        }

        .input-box input::placeholder {
            color: rgba(255, 255, 255, 0.7);
            transition: 0.3s;
        }

        .input-box input:focus::placeholder {
            opacity: 0;
        }
    </style>
</head>


<body>

    <div class="main-tab">

        <div class="sign-in">
            <p>Login</p>
        </div>

        <div class="input-box">
            <input type="text" placeholder="Username">
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password">
        </div>


        <div class="remember-forgot">

            <label class="remember">
                <input type="checkbox">Remember Me
            </label>

            <a href="#">Forgot password</a>

        </div>


        <button class="submit">
            Submit
        </button>

        <p class="register" >
            don't have an account?  register
        </p>

    </div>

</body>

</html>
